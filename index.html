async function getSCAD(){
  if(scadInstance) return scadInstance;
  if(!scadLoading){
    scadLoading = (async ()=>{
      log('Loading OpenSCAD WASM engine…');
      const mod = await import('openscad-wasm');
      const inst = await mod.default({noInitialRun:true, print:t=>log(t), printErr:t=>log(t,'error')});
      try{ inst.FS.mkdirTree('/libraries'); }catch{}
      try{ inst.FS.mkdirTree('/tmp'); }catch{}
      scadInstance = inst;
      log('Engine ready','success');
      await loadLibraries();
      return inst;
    })();
  }
  return scadLoading;
}

async function ensureLibrary(lib){
  const status = $('#lib-status');
  status.textContent = `Loading ${lib.name}…`;
  const cached = await get(`oscad-lib-${lib.id}`).catch(()=>null);
  if(cached && cached.length){
    libraryFiles[lib.id] = cached;
    try{ scadInstance.FS.mkdirTree(`/libraries/${lib.id}`); }catch{}
    for(const f of cached){ 
      try{
        const dir = `/libraries/${lib.id}/${f.path}`.split('/').slice(0,-1).join('/');
        try{ scadInstance.FS.mkdirTree(dir); }catch{}
        scadInstance.FS.writeFile(`/libraries/${lib.id}/${f.path}`, f.content);
      }catch{}
    }
    status.textContent = `${lib.name} (cached)`;
    return;
  }
  try{
    const ctrl = new AbortController(); const to=setTimeout(()=>ctrl.abort(),8000);
    const res = await fetch(lib.url,{signal:ctrl.signal, mode:'cors'});
    clearTimeout(to);
    if(!res.ok) throw new Error('fetch');
    const buf = await res.arrayBuffer();
    const zip = await JSZip.loadAsync(buf);
    const filesOut = [];
    await Promise.all(Object.values(zip.files).map(async e=>{
      if(e.dir) return;
      if(!e.name.startsWith(lib.prefix)) return;
      if(!e.name.endsWith('.scad')) return;
      const rel = e.name.slice(lib.prefix.length);
      const content = await e.async('string');
      filesOut.push({path:rel, content});
      try{
        const full = `/libraries/${lib.id}/${rel}`;
        const dir = full.split('/').slice(0,-1).join('/');
        try{ scadInstance.FS.mkdirTree(dir);}catch{}
        scadInstance.FS.writeFile(full, content);
      }catch{}
    }));
    libraryFiles[lib.id]=filesOut;
    await set(`oscad-lib-${lib.id}`, filesOut);
    status.textContent = `${lib.name} loaded (${filesOut.length} files)`;
    log(`${lib.name} loaded`,'success');
  }catch(e){
    log(`${lib.name} offline - using stub`,'warn');
    const stub = [{path:'std.scad', content:`// ${lib.name} offline stub\nmodule stub() cube(10);`}];
    libraryFiles[lib.id]=stub;
    try{ scadInstance.FS.mkdirTree(`/libraries/${lib.id}`);}catch{}
    scadInstance.FS.writeFile(`/libraries/${lib.id}/std.scad`, stub[0].content);
    await set(`oscad-lib-${lib.id}`, stub);
    status.textContent = `${lib.name} (offline)`;
  }
}

async function loadLibraries(){
  $('#lib-status').textContent = 'Loading libraries…';
  for(const lib of LIBRARIES){ await ensureLibrary(lib); renderLibraryTree(); }
  $('#lib-status').textContent = `Libraries ready (${Object.values(libraryFiles).reduce((a,b)=>a+b.length,0)} files)`;
}

function renderLibraryTree(filter=''){
  const tree = $('#lib-tree'); tree.innerHTML='';
  LIBRARIES.forEach(lib=>{
    const files = (libraryFiles[lib.id]||[]).filter(f=>!filter || f.path.toLowerCase().includes(filter.toLowerCase()));
    if(!files.length && filter) return;
    const det = document.createElement('details'); det.open = true; det.className='mb-1';
    const sum = document.createElement('summary'); sum.className='cursor-pointer px-1.5 py-1 rounded hover:bg-[#141a23] flex items-center gap-1.5'; sum.innerHTML=`<i class="ri-folder-3-line text-gray-500"></i><span>${lib.name}</span><span class="text-[10px] text-gray-600 ml-auto">${files.length}</span>`;
    det.appendChild(sum);
    const list = document.createElement('div'); list.className='ml-4 border-l border-[#1a2030] pl-2';
    files.slice(0,300).forEach(f=>{
      const item = document.createElement('div'); item.className='py-0.5 px-1.5 rounded hover:bg-[#1a2030] cursor-pointer flex items-center gap-1.5'; item.innerHTML=`<i class="ri-file-code-line text-gray-600 text-[11px]"></i><span class="truncate">${f.path}</span>`;
      item.title = `include <${lib.id}/${f.path}>`;
      item.onclick = ()=> insertText(`include <${lib.id}/${f.path}>\n`);
      item.oncontextmenu = (e)=>{ e.preventDefault(); insertText(`use <${lib.id}/${f.path}>\n`); };
      list.appendChild(item);
    });
    det.appendChild(list); tree.appendChild(det);
  });
}

function initThree(){
  const cont = $('#preview');
  scene = new THREE.Scene(); scene.background = new THREE.Color(0x080a0e);
  camera = new THREE.PerspectiveCamera(45,1,0.1,2000); camera.position.set(90,70,110);
  renderer = new THREE.WebGLRenderer({antialias:true, alpha:true}); renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  cont.appendChild(renderer.domElement);
  controls = new OrbitControls(camera, renderer.domElement); controls.enableDamping=true; controls.dampingFactor=0.08;
  scene.add(new THREE.HemisphereLight(0x9fb5ff,0x0a0e15,0.8));
  const dl = new THREE.DirectionalLight(0xffffff,1.1); dl.position.set(2,3,4); scene.add(dl);
  const grid = new THREE.GridHelper(200,40,0x1e293b,0x111827); grid.position.y=-0.01; scene.add(grid);
  const resize = ()=>{ const r=cont.getBoundingClientRect(); renderer.setSize(r.width,r.height); camera.aspect=r.width/r.height; camera.updateProjectionMatrix(); };
  new ResizeObserver(resize).observe(cont); resize();
  (function animate(){ requestAnimationFrame(animate); controls.update(); renderer.render(scene,camera); })();
}

function loadSTL(data){
  try{
    scene.children.filter(o=>o.userData.isModel).forEach(o=>scene.remove(o));
    const loader = new STLLoader();
    const geom = loader.parse(data.buffer.slice(0));
    geom.computeVertexNormals(); geom.center();
    const mat = new THREE.MeshStandardMaterial({color:0x60a5fa, metalness:0.15, roughness:0.42, flatShading:false});
    mesh = new THREE.Mesh(geom, mat); mesh.userData.isModel=true;
    scene.add(mesh);
    const box = new THREE.Box3().setFromObject(mesh); const size = box.getSize(new THREE.Vector3()).length();
    controls.target.set(0,0,0); camera.position.set(size*0.9,size*0.7,size*0.9); controls.update();
    $('#preview-info').textContent = `${(data.length/1024).toFixed(1)} KB • ${geom.attributes.position.count/3|0} tris`;
  }catch(e){ log('Preview error: '+e.message,'error'); }
}

function initEditor(){
  const extensions = [
    basicSetup,
    cpp(),
    oneDark,
    lineNumbers(), highlightActiveLineGutter(), bracketMatching(),
    syntaxHighlighting(defaultHighlightStyle),
    EditorView.lineWrapping,
    history(),
    keymap.of([...defaultKeymap, ...historyKeymap,
      {key:'Mod-Enter', run:()=>{render();return true}},
      {key:'Mod-s', run:()=>{saveFile();return true}}
    ]),
    EditorView.updateListener.of(u=>{ if(u.docChanged){ scheduleParse(); if(autoRender) scheduleRender(); }})
  ];
  editor = new EditorView({ state: EditorState.create({doc: files[currentFile] || DEFAULT_CODE, extensions}), parent: $('#editor') });
}

let parseTimeout;
function scheduleParse(){ clearTimeout(parseTimeout); parseTimeout=setTimeout(parseCustomizer,300); }

function parseCustomizer(){
  const code = editor.state.doc.toString();
  const lines = code.split('\n');
  let group='Parameters'; const params=[];
  const groupRe=/\/\*\s*\[([^\]]+)\]\s*\*\//;
  const varRe=/^\s*([A-Za-z_]\w*)\s*=\s*([^;]+);\s*(?:\/\/\s*(.*))?$/;
  for(const line of lines){
    const gm=line.match(groupRe); if(gm){ group=gm[1].trim(); continue; }
    const vm=line.match(varRe); if(!vm) continue;
    const name=vm[1]; let def=vm[2].trim(); const comment=vm[3]||'';
    let type='number', min,max,step=1, options;
    if(def==='true'||def==='false'){ type='checkbox'; def=def==='true'; }
    else if(/^".*"$/.test(def)){ type='string'; def=def.slice(1,-1); }
    else if(!isNaN(Number(def))){ def=Number(def); }
    const rs=comment.match(/\[\s*([-\d.]+)\s*:\s*([-\d.]+)\s*:\s*([-\d.]+)\s*\]/);
    const r=comment.match(/\[\s*([-\d.]+)\s*:\s*([-\d.]+)\s*\]/);
    const dd=[...comment.matchAll(/"([^"]+)"/g)].map(m=>m[1]);
    if(rs){ min=+rs[1];max=+rs[2];step=+rs[3]; type='slider'; }
    else if(r){ min=+r[1];max=+r[2]; type='slider'; }
    else if(dd.length>1){ options=dd; type='dropdown'; }
    if(/slider/i.test(comment) && type==='number') type='slider';
    if(/color/i.test(comment) || /^#/.test(String(def))) type='color';
    params.push({name, default:def, type, min, max, step, options, group});
    if(!(name in customizerValues)) customizerValues[name]=def;
  }
  customizerParams=params; buildCustomizer(params);
}

function buildCustomizer(params){
  const c = $('#customizer-content'); c.innerHTML='';
  if(!params.length){ c.innerHTML=`<div class="text-[11px] text-gray-500 p-4 text-center">No parameters found.<br>Use <code>/* [Group] */</code> and <code>// [min:max]</code></div>`; return; }
  const groups={}; params.forEach(p=>(groups[p.group]??=[]).push(p));
  Object.entries(groups).forEach(([gName,list])=>{
    const det=document.createElement('details'); det.open=true; det.className='mb-3';
    const sum=document.createElement('summary'); sum.className='cursor-pointer text-[12px] font-medium text-gray-300 mb-2 list-none flex items-center gap-1'; sum.innerHTML=`<i class="ri-arrow-down-s-line"></i>${gName}`;
    det.appendChild(sum);
    list.forEach(p=>{
      const wrap=document.createElement('div'); wrap.className='mb-2.5';
      const lab=document.createElement('label'); lab.className='block text-[11px] text-gray-400 mb-1'; lab.textContent=p.name; wrap.appendChild(lab);
      const val = customizerValues[p.name] ?? p.default;
      let input;
      const base='w-full bg-[#0b0e13] border border-[#232938] rounded px-2 py-1.5 text-xs outline-none focus:border-blue-500';
      switch(p.type){
        case 'checkbox':
          input=document.createElement('input'); input.type='checkbox'; input.checked=!!val; input.className='w-4 h-4 accent-blue-600';
          input.onchange=()=>{ customizerValues[p.name]=input.checked; scheduleRender(); };
          wrap.appendChild(input); break;
        case 'slider':
          const row=document.createElement('div'); row.className='flex items-center gap-2';
          input=document.createElement('input'); input.type='range'; input.min=p.min??0; input.max=p.max??100; input.step=p.step??1; input.value=val; input.className='flex-1 accent-blue-600';
          const num=document.createElement('input'); num.type='number'; num.value=val; num.step=p.step??1; num.className='w-16 '+base;
          input.oninput=()=>{ num.value=input.value; customizerValues[p.name]=+input.value; scheduleRender(); };
          num.oninput=()=>{ input.value=num.value; customizerValues[p.name]=+num.value; scheduleRender(); };
          row.append(input,num); wrap.appendChild(row); break;
        case 'dropdown':
          input=document.createElement('select'); input.className=base; p.options.forEach(o=>{ const op=document.createElement('option'); op.value=o; op.textContent=o; input.appendChild(op); }); input.value=val;
          input.onchange=()=>{ customizerValues[p.name]=input.value; scheduleRender(); }; wrap.appendChild(input); break;
        case 'color':
          input=document.createElement('input'); input.type='color'; input.value=toHex(val); input.className='w-full h-8 cursor-pointer bg-transparent';
          input.oninput=()=>{ customizerValues[p.name]=input.value; scheduleRender(); }; wrap.appendChild(input); break;
        case 'string':
          input=document.createElement('input'); input.type='text'; input.value=val; input.className=base;
          input.oninput=()=>{ customizerValues[p.name]=input.value; scheduleRender(); }; wrap.appendChild(input); break;
        default:
          input=document.createElement('input'); input.type='number'; input.value=val; input.step='any'; input.className=base;
          input.oninput=()=>{ customizerValues[p.name]=Number(input.value); scheduleRender(); }; wrap.appendChild(input);
      }
      det.appendChild(wrap);
    });
    c.appendChild(det);
  });
}
const toHex=v=>{ if(typeof v==='string'&&v.startsWith('#'))return v; if(Array.isArray(v)){ const [r,g,b]=v.map(x=>Math.round(x*255)); return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join(''); } return '#3b82f6'; };

function scheduleRender(){ clearTimeout(renderTimeout); renderTimeout=setTimeout(render,400); }

async function render(){
  const scad = await getSCAD();
  const code = editor.state.doc.toString();
  try{ scad.FS.writeFile('/input.scad', code); }catch{}
  const args=['/input.scad','-o','/out.stl','-I','/libraries','--export-format','binstl'];
  customizerParams.forEach(p=>{
    let v = customizerValues[p.name]; if(v===undefined) return;
    let val=v;
    if(p.type==='string'||p.type==='dropdown') val=`"${String(v).replace(/"/g,'\\"')}"`;
    else if(p.type==='checkbox') val=v?'true':'false';
    else if(p.type==='color'){ const h=String(v).replace('#',''); const r=parseInt(h.slice(0,2),16)/255; const g=parseInt(h.slice(2,4),16)/255; const b=parseInt(h.slice(4,6),16)/255; val=`[${r.toFixed(3)},${g.toFixed(3)},${b.toFixed(3)}]`; }
    args.push('-D', `${p.name}=${val}`);
  });
  $('#console-status').textContent='rendering…';
  try{
    const t0=performance.now();
    scad.callMain(args);
    const out = scad.FS.readFile('/out.stl');
    loadSTL(out);
    log(`Rendered in ${(performance.now()-t0).toFixed(0)}ms`,'success');
  }catch(e){ log(e.message||String(e),'error'); }
}

async function exportAs(ext){
  const scad = await getSCAD();
  const code = editor.state.doc.toString();
  scad.FS.writeFile('/input.scad', code);
  const out=`/out.${ext}`;
  try{
    scad.callMain(['/input.scad','-o',out,'-I','/libraries']);
    const data = scad.FS.readFile(out);
    const blob = new Blob([data],{type:'application/octet-stream'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`model.${ext}`; a.click(); URL.revokeObjectURL(a.href);
    log(`Exported ${ext.toUpperCase()}`,'success');
  }catch(e){ log('Export failed: '+e.message,'error'); }
}

function insertText(txt){ editor.dispatch({changes:{from:editor.state.selection.main.from, insert:txt}}); editor.focus(); }

function setupFiles(){
  if(!Object.keys(files).length){ files[currentFile]=DEFAULT_CODE; localStorage.setItem('oscad-files', JSON.stringify(files)); }
  refreshFiles();
  loadFile(currentFile);
}
function refreshFiles(){
  const list=$('#file-list'); list.innerHTML='';
  Object.keys(files).sort().forEach(name=>{
    const div=document.createElement('div'); div.className='group flex items-center justify-between px-2 py-1.5 rounded hover:bg-[#141a23] cursor-pointer text-xs '+(name===currentFile?'bg-[#1a2030] text-white':'text-gray-300'); div.innerHTML=`<span class="truncate"><i class="ri-file-code-line mr-1.5 text-gray-500"></i>${name}</span><button class="opacity-0 group-hover:opacity-100 text-gray-500 hover:text-red-400" title="Delete"><i class="ri-close-line"></i></button>`;
    div.onclick=(e)=>{ if(e.target.closest('button')){ delete files[name]; localStorage.setItem('oscad-files',JSON.stringify(files)); refreshFiles(); return;} loadFile(name); };
    list.appendChild(div);
  });
}
function loadFile(name){ currentFile=name; const code=files[name]||''; editor.dispatch({changes:{from:0,to:editor.state.doc.length,insert:code}}); refreshFiles(); parseCustomizer(); }
function saveFile(){ files[currentFile]=editor.state.doc.toString(); localStorage.setItem('oscad-files', JSON.stringify(files)); log(`Saved ${currentFile}`,'success'); refreshFiles(); }
function newFile(){ const name=prompt('File name:',`part${Object.keys(files).length+1}.scad`); if(!name) return; files[name]='cube(20);'; currentFile=name; localStorage.setItem('oscad-files',JSON.stringify(files)); loadFile(name); }

function initUI(){
  document.querySelectorAll('.tab').forEach(btn=>{
    btn.onclick=()=>{ document.querySelectorAll('.tab').forEach(b=>b.classList.remove('tab-active')); btn.classList.add('tab-active'); const tab=btn.dataset.tab; $('#panel-files').classList.toggle('hidden',tab!=='files'); $('#panel-libs').classList.toggle('hidden',tab!=='libs'); $('#panel-examples').classList.toggle('hidden',tab!=='examples'); };
  });
  $('#btn-render').onclick=render;
  $('#btn-auto').onclick=function(){ autoRender=!autoRender; this.classList.toggle('bg-[#1e2533]',autoRender); this.classList.toggle('bg-[#11151d]',!autoRender); };
  $('#btn-new').onclick=newFile; $('#btn-new-file').onclick=newFile;
  $('#btn-save').onclick=saveFile;
  $('#btn-open').onclick=()=>$('#file-open').click();
  $('#file-open').onchange=async e=>{ const f=e.target.files[0]; if(!f) return; const txt=await f.text(); files[f.name]=txt; currentFile=f.name; localStorage.setItem('oscad-files',JSON.stringify(files)); loadFile(f.name); };
  $('#btn-import').onclick=()=>$('#file-stl').click();
  $('#file-stl').onchange=async e=>{ const f=e.target.files[0]; if(!f) return; const buf=new Uint8Array(await f.arrayBuffer()); const scad=await getSCAD(); scad.FS.writeFile('/import.stl', buf); insertText(`import("/import.stl");\n`); log(`Imported ${f.name} (${(buf.length/1024).toFixed(1)}KB)`,'success'); };
  $('#btn-export').onclick=()=>$('#export-menu').classList.toggle('hidden');
  document.addEventListener('click',e=>{ if(!e.target.closest('#btn-export')) $('#export-menu').classList.add('hidden'); });
  $('#export-menu').onclick=e=>{ const b=e.target.closest('button'); if(!b) return; exportAs(b.dataset.ext); $('#export-menu').classList.add('hidden'); };
  $('#btn-reset').onclick=()=>{ customizerValues={}; parseCustomizer(); scheduleRender(); };
  $('#btn-clear-console').onclick=()=>$('#console-log').innerHTML='';
  $('#lib-search').oninput=e=>renderLibraryTree(e.target.value);
  $('#view-reset').onclick=()=>{ if(mesh){ controls.target.set(0,0,0); camera.position.set(90,70,110); controls.update(); } };
  $('#view-wire').onclick=function(){ if(mesh){ mesh.material.wireframe=!mesh.material.wireframe; this.classList.toggle('bg-blue-600'); } };
  $('#vresizer').onmousedown=e=>{ e.preventDefault(); const prev=e.clientY; const preview=$('#preview'); const startH=preview.offsetHeight; const onMove=ev=>{ const dh=ev.clientY-prev; preview.style.height=Math.max(120, startH+dh)+'px'; }; const up=()=>{ window.removeEventListener('mousemove',onMove); window.removeEventListener('mouseup',up); }; window.addEventListener('mousemove',onMove); window.addEventListener('mouseup',up); };
  $('#btn-gist').onclick=async()=>{ const token=localStorage.getItem('github-token')||prompt('GitHub Personal Access Token (gist scope):'); if(!token) return; localStorage.setItem('github-token',token); const code=editor.state.doc.toString(); try{ const res=await fetch('https://api.github.com/gists',{method:'POST',headers:{Authorization:`token ${token}`,'Content-Type':'application/json'},body:JSON.stringify({public:false,files:{[currentFile]:{content:code}}})}); const j=await res.json(); if(j.html_url){ log('Gist saved: '+j.html_url,'success'); window.open(j.html_url,'_blank'); } else throw new Error(j.message); }catch(e){ log('Gist failed: '+e.message,'error'); } };
  // examples
  const eg=$('#examples-grid'); EXAMPLES.forEach(ex=>{ const b=document.createElement('button'); b.className='w-full text-left px-2.5 py-2 rounded hover:bg-[#141a23] border border-transparent hover:border-[#232938] text-xs'; b.innerHTML=`<div class="font-medium text-gray-200">${ex.name}</div><div class="text-[10px] text-gray-500 truncate">${ex.code.split('\n')[0].slice(0,60)}</div>`; b.onclick=()=>{ editor.dispatch({changes:{from:0,to:editor.state.doc.length,insert:ex.code}}); parseCustomizer(); if(autoRender) scheduleRender(); document.querySelector('[data-tab="files"]').click(); }; eg.appendChild(b); });
}

initThree();
initEditor();
initUI();
setupFiles();
parseCustomizer();
log('OpenSCAD Ultimate IDE ready. Libraries load on first render.','success');
renderLibraryTree();

(() => { const g=new THREE.BoxGeometry(18,18,18); const m=new THREE.MeshStandardMaterial({color:0x3b82f6, metalness:0.2, roughness:0.5}); const c=new THREE.Mesh(g,m); c.userData.isModel=true; scene.add(c); })();
</script>
